{% extends "base.html" %}

{% block title %}Settle Up - {{ group.name }} - SplitEase{% endblock %}

{% block content %}
<div style="margin-bottom: 2rem;">
    <h2 style="color: var(--accent-teal);">Record a Payment</h2>
    <a href="/groups/{{ group.id }}/balances" style="color: var(--text-muted); font-size: 0.9rem;">&larr; Back to Balances</a>
</div>

<div class="card" style="max-width: 500px; margin: 0 auto;">
    <form action="/groups/{{ group.id }}/settlements" method="POST">
        
        <div class="form-group">
            <label class="form-label">Who Paid?</label>
            <select name="from_user_id" class="form-control" required>
                <option value="">Select Member</option>
                {% for member in members %}
                    <option value="{{ member.user.id }}" {% if prefill_from == member.user.id %}selected{% endif %}>
                        {{ member.user.name }}
                    </option>
                {% endfor %}
            </select>
        </div>
        
        <div class="form-group" style="text-align: center; color: var(--text-muted); font-size: 1.5rem;">
            &darr;
        </div>
        
        <div class="form-group">
            <label class="form-label">Who Received?</label>
            <select name="to_user_id" class="form-control" required>
                <option value="">Select Member</option>
                {% for member in members %}
                    <option value="{{ member.user.id }}" {% if prefill_to == member.user.id %}selected{% endif %}>
                        {{ member.user.name }}
                    </option>
                {% endfor %}
            </select>
        </div>
        
        <div class="form-group">
            <label class="form-label">Amount (INR)</label>
            <input type="number" step="0.01" name="amount" class="form-control" required value="{{ prefill_amount if prefill_amount else '' }}">
        </div>
        
        <div class="form-group">
            <label class="form-label">Date</label>
            <input type="date" name="date" class="form-control" required id="date_input">
        </div>
        
        <div class="form-group">
            <label class="form-label">Note (Optional)</label>
            <input type="text" name="note" class="form-control" placeholder="E.g., Paytm transfer">
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Record Payment</button>
    </form>
</div>

<script>
    // Automatically set today's date if not pre-filled
    if (!document.getElementById('date_input').value) {
        document.getElementById('date_input').valueAsDate = new Date();
    }
</script>
{% endblock %}
