{% extends "base.html" %}

{% block title %}Sign Up - SplitEase{% endblock %}

{% block content %}
<div class="card" style="max-width: 400px; margin: 4rem auto;">
    <h2 style="text-align: center; margin-bottom: 1.5rem; color: var(--accent-teal);">Create an Account</h2>
    
    <form action="/signup" method="POST">
        <div class="form-group">
            <label for="name" class="form-label">Full Name</label>
            <input type="text" id="name" name="name" class="form-control" required autofocus>
        </div>
        
        <div class="form-group">
            <label for="email" class="form-label">Email Address</label>
            <input type="email" id="email" name="email" class="form-control" required>
        </div>
        
        <div class="form-group">
            <label for="password" class="form-label">Password (min 6 chars)</label>
            <input type="password" id="password" name="password" minlength="6" class="form-control" required>
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Sign Up</button>
    </form>
    
    <p style="text-align: center; margin-top: 1.5rem; color: var(--text-muted);">
        Already have an account? <a href="/login">Login</a>
    </p>
</div>
{% endblock %}
